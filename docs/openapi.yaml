openapi: 3.1.0
info:
  title: Domain Intelligence Studio API
  version: 0.1.0
  description: Public API contract for TLD catalog, domain availability checks, name generation, projects, jobs, and exports.
servers:
  - url: http://localhost:3000
paths:
  /api/tlds:
    get:
      summary: Return configured TLD catalog.
      responses:
        "200":
          description: TLD catalog.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TldCatalogEntry"
  /api/check:
    post:
      summary: Check one name across extensions or exact domains.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckRequest"
      responses:
        "200":
          description: Domain check results with summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/check-bulk:
    post:
      summary: Queue a bulk domain availability job.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCheckRequest"
      responses:
        "202":
          description: Bulk job queued.
          content:
            application/json:
              schema:
                type: object
                required: [jobId, status]
                properties:
                  jobId:
                    type: string
                  status:
                    const: queued
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/jobs/{jobId}:
    get:
      summary: Return bulk job progress and results.
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/generate:
    post:
      summary: Generate AI-native name candidates and check selected domains.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRequest"
      responses:
        "200":
          description: Generated candidates and recommendations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/projects:
    get:
      summary: List saved shortlist projects.
      responses:
        "200":
          description: Saved projects.
          content:
            application/json:
              schema:
                type: object
                required: [projects]
                properties:
                  projects:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
    post:
      summary: Save a shortlist project.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectRequest"
      responses:
        "201":
          description: Created project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/export:
    post:
      summary: Export results as CSV, XLSX, or JSON.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportRequest"
      responses:
        "200":
          description: Export payload.
          content:
            text/csv:
              schema:
                type: string
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
components:
  responses:
    BadRequest:
      description: Request validation error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    AvailabilityStatus:
      enum:
        - available_confirmed
        - taken_confirmed
        - premium_available
        - restricted
        - unknown
        - rate_limited
        - invalid
        - manual_check_required
    Confidence:
      enum: [high, medium, low]
    Source:
      enum: [registrar_api, rdap, whois, dns, mock, manual]
    DomainCheckResult:
      type: object
      required:
        - domain
        - sld
        - tld
        - status
        - confidence
        - source
        - providerName
        - checkedAt
        - premium
      properties:
        domain:
          type: string
        sld:
          type: string
        tld:
          type: string
        status:
          $ref: "#/components/schemas/AvailabilityStatus"
        confidence:
          $ref: "#/components/schemas/Confidence"
        source:
          $ref: "#/components/schemas/Source"
        providerName:
          type: string
        checkedAt:
          type: string
          format: date-time
        priceRegistration:
          type: number
        priceRenewal:
          type: number
        currency:
          type: string
        premium:
          type: boolean
        registrarUrl:
          type: string
        rawSummary:
          type: string
        errorCode:
          type: string
        errorMessage:
          type: string
    TldCatalogEntry:
      type: object
      required:
        - tld
        - label
        - category
        - restricted
        - requiresEligibility
        - supportedProviders
        - defaultEnabled
      properties:
        tld:
          type: string
        label:
          type: string
        category:
          type: string
        restricted:
          type: boolean
        requiresEligibility:
          type: boolean
        supportedProviders:
          type: array
          items:
            type: string
        defaultEnabled:
          type: boolean
    CheckRequest:
      type: object
      required: [name, extensions]
      properties:
        name:
          type: string
        extensions:
          type: array
          items:
            type: string
        providers:
          type: array
          items:
            type: string
          default: [auto]
        forceRefresh:
          type: boolean
          default: false
    CheckResponse:
      type: object
      required: [queryId, results, summary]
      properties:
        queryId:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/DomainCheckResult"
        summary:
          type: object
          required: [availableCount, takenCount, unknownCount, bestDomain]
          properties:
            availableCount:
              type: integer
            takenCount:
              type: integer
            unknownCount:
              type: integer
            bestDomain:
              type:
                - string
                - "null"
    BulkCheckRequest:
      type: object
      required: [names, extensions]
      properties:
        names:
          type: array
          items:
            type: string
        extensions:
          type: array
          items:
            type: string
        forceRefresh:
          type: boolean
          default: false
    JobResponse:
      type: object
      required: [jobId, status, progress, results]
      properties:
        jobId:
          type: string
        status:
          enum: [queued, running, completed, failed]
        progress:
          type: object
          required: [total, checked]
          properties:
            total:
              type: integer
            checked:
              type: integer
        results:
          type: array
          items:
            $ref: "#/components/schemas/DomainCheckResult"
    GenerateRequest:
      type: object
      required: [seedWords, style, minLength, maxLength, count, extensions]
      properties:
        seedWords:
          type: array
          items:
            type: string
        style:
          type: array
          items:
            type: string
        minLength:
          type: integer
        maxLength:
          type: integer
        count:
          type: integer
        extensions:
          type: array
          items:
            type: string
    GenerateResponse:
      type: object
      required: [candidates, recommendations]
      properties:
        candidates:
          type: array
          items:
            type: object
            required: [name, meaning, style, brandScore, domains]
            properties:
              name:
                type: string
              meaning:
                type: string
              style:
                type: string
              brandScore:
                type: integer
              domains:
                type: array
                items:
                  $ref: "#/components/schemas/DomainCheckResult"
        recommendations:
          type: array
          items:
            type: object
    ProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        domains:
          type: array
          items:
            type: string
        shortlist:
          type: array
          items:
            type: string
        notes:
          type: string
        preferredRegistrar:
          type: string
    Project:
      allOf:
        - $ref: "#/components/schemas/ProjectRequest"
        - type: object
          required: [id, createdAt, updatedAt]
          properties:
            id:
              type: string
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
    ExportRequest:
      type: object
      required: [format, results]
      properties:
        format:
          enum: [csv, xlsx, json]
        results:
          type: array
          items:
            $ref: "#/components/schemas/DomainCheckResult"
        recommendations:
          type: array
          items:
            type: object
        filename:
          type: string
    ErrorResponse:
      type: object
      required: [error, code, issues]
      properties:
        error:
          type: string
        code:
          type: string
        issues:
          type: array
          items: {}
