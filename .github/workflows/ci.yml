name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  verify:
    name: Install, lint, test, build, smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: domain
          POSTGRES_PASSWORD: domain
          POSTGRES_DB: domain_intelligence
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U domain -d domain_intelligence"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      DATABASE_URL: postgresql://domain:domain@127.0.0.1:5432/domain_intelligence?schema=public
      REDIS_URL: redis://127.0.0.1:6379
      DEFAULT_CACHE_TTL_HOURS: "24"
      ENABLE_MOCK_PROVIDER: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Playwright smoke test
        run: npx playwright test tests/e2e/domain-studio.spec.ts --project=chromium --grep "user enters a seed name"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
